# ─────────────────────────────────────────────
#  Inventory API - Application Configuration
# ─────────────────────────────────────────────

spring.application.name=inventory-api
server.port=8080

# ── H2 In-Memory Database (default, works immediately) ──
spring.datasource.url=jdbc:h2:file:./data/inventorydb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (visit http://localhost:8080/h2-console to browse your DB live)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (uncomment + comment out H2 above when deploying to Railway) ──
# spring.datasource.url=jdbc:mysql://localhost:3306/inventorydb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Swagger UI ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.info.title=Inventory & Order Management API
springdoc.info.description=REST API for managing products, categories, orders, and stock
springdoc.info.version=1.0.0

# ── Seed data on startup ──
spring.sql.init.mode=always
